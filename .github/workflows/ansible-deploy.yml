name: Ansible Deployment

on:
  push:
    branches: [ master, lab06 ]

  pull_request:
    branches: [ master ]
    paths:
      - 'app_python/ansible/**'

jobs:

  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint

      - name: Run ansible-lint
        run: |
          cd app_python/ansible
          ansible-lint playbooks/*.yml


  deploy:
    name: Deploy Application
    # needs: lint
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts
      
      - name: Recreate group_vars/all.yml
        run: |
          mkdir -p app_python/ansible/group_vars
          echo "${{ secrets.ANSIBLE_GROUP_VARS_ALL }}" | base64 --decode > app_python/ansible/group_vars/all.yml

      - name: Run Ansible Playbook
        run: |
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > /tmp/vault_pass
          cd app_python/ansible

          ansible-playbook playbooks/deploy.yml \
            -i inventory/hosts.ini \
            --vault-password-file /tmp/vault_pass \
            --extra-vars @./group_vars/all.yml

          rm /tmp/vault_pass

      - name: Verify Deployment
        run: |
          sleep 10
          curl -f http://${{ secrets.VM_HOST }}:8000 || exit 1
          curl -f http://${{ secrets.VM_HOST }}:8000/health || exit 1