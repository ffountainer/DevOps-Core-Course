{{- $secretName := .Values.secret.name | default (include "mychart.fullname" .) }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secret.data.username | quote }}
  password: {{ .Values.secret.data.password | quote }}